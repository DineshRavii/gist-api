apiVersion: apps/v1
kind: Deployment
metadata:
  name: gist-api
  labels:
    app: gist-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gist-api
  template:
    metadata:
      labels:
        app: gist-api
    spec:
      containers:
      - name: gist-api
        image: ghcr.io/dineshravii/gist-api:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gist-api
spec:
  type: NodePort
  selector:
    app: gist-api
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080