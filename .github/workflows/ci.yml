name: CI pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        name: Run tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup python
              uses: actions/setup-python@v5
              with:
                    python-version: 3.12

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest test_app.py -v

    build:
        name: Built docker image
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build docker image
              run: docker build -t gist-api:latest .